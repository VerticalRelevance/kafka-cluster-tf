version: 0.2

phases:
  install:
    commands:
      - wget https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
      - unzip terraform_1.5.7_linux_amd64.zip
      - mv terraform /usr/local/bin/
  build:
    commands:
      - terraform init 
      - terraform plan -var="key_pair_name=kafka-key"
  post-build:
    commands:
      - terraform apply -auto-approve -var="key_pair_name=kafka-key"

